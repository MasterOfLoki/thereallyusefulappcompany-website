<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Really Useful App Company</title>
    <meta name="description" content="The Really Useful App Company — practical tools and apps built with AI.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0f1a;
            color: #e8eaf0;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(56, 109, 194, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(99, 179, 237, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(49, 130, 206, 0.04) 0%, transparent 40%);
            animation: drift 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 640px;
        }

        /* Logo mark */
        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2b6cb0 0%, #4299e1 50%, #63b3ed 100%);
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(66, 153, 225, 0.25);
        }

        .logo-mark svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .company-name {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: #f7fafc;
        }

        .company-name span {
            color: #63b3ed;
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            color: #a0aec0;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4299e1, transparent);
            margin: 0 auto 2.5rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            background: rgba(66, 153, 225, 0.1);
            border: 1px solid rgba(66, 153, 225, 0.2);
            font-size: 0.85rem;
            font-weight: 400;
            color: #90cdf4;
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .contact {
            font-size: 0.9rem;
            color: #718096;
        }

        .contact a {
            color: #90cdf4;
            text-decoration: none;
            border-bottom: 1px solid rgba(144, 205, 244, 0.3);
            transition: border-color 0.2s;
        }

        .contact a:hover {
            border-color: #90cdf4;
        }

        .footer {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.75rem;
            color: #4a5568;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .company-name { font-size: 1.4rem; }
            .tagline { font-size: 1rem; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                <style>path{fill:none;stroke:white;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}</style>
            </svg>
        </div>

        <h1 class="company-name">The Really Useful <span>App</span> Company</h1>

        <p class="tagline">Innovative tools and applications, built with AI.</p>

        <div class="divider"></div>

        <div class="status">
            <span class="status-dot"></span>
            Something is brewing
        </div>

        <p class="contact">
            Get in touch: <a href="mailto:simon@reallyusefulapp.co.uk">simon@reallyusefulapp.co.uk</a>
        </p>
    </div>

    <div class="footer">
        &copy; 2026 The Really Useful App Company
    </div>
</body>
</html>
